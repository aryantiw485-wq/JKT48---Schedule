name: JKT48 Calendar Sync

on:
  schedule:
    - cron: "0 */3 * * *"  # tiap 3 jam
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install google-api-python-client google-auth requests

      - name: Run script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          CALENDAR_ID_THEATER: ${{ secrets.CALENDAR_ID_THEATER }}
          CALENDAR_ID_EVENT: ${{ secrets.CALENDAR_ID_EVENT }}
          CALENDAR_ID_ONLINE: ${{ secrets.CALENDAR_ID_ONLINE }}
        run: python main.py
